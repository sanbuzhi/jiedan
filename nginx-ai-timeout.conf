# Nginx AI接口超时配置
# 适用于AI接口调用（10分钟超时）

upstream backend {
    server 127.0.0.1:8080;
    keepalive 32;
}

server {
    listen 80;
    server_name localhost;

    # 客户端上传文件大小限制
    client_max_body_size 50M;
    
    # 代理超时配置（必须大于后端10分钟超时）
    proxy_connect_timeout 720s;      # 连接超时：12分钟
    proxy_send_timeout 720s;         # 发送超时：12分钟
    proxy_read_timeout 720s;         # 读取超时：12分钟（关键配置）
    
    # 其他代理配置
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    
    # 缓冲区配置
    proxy_buffering off;
    proxy_request_buffering off;
    
    # 长连接配置
    keepalive_timeout 720s;
    keepalive_requests 1000;
    
    # 错误处理
    proxy_intercept_errors on;
    error_page 504 = @timeout;
    
    # AI接口路径
    location /api/ai/ {
        proxy_pass http://backend/api/ai/;
        
        # AI接口专用超时配置（可单独调整）
        proxy_read_timeout 720s;
        proxy_send_timeout 720s;
    }
    
    # 其他API路径
    location /api/ {
        proxy_pass http://backend/api/;
        
        # 普通接口使用较短超时
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
    
    # 超时错误处理
    location @timeout {
        return 504 '{"code": 504, "message": "AI服务响应超时，请稍后重试"}';
        add_header Content-Type application/json;
    }
}
